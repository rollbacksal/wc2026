<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Kupası 2026 — Tahmin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.container{max-width:980px;margin:0 auto;padding:16px}
header{text-align:center;padding:20px 0 12px}
header h1{font-size:24px;font-weight:600;margin-bottom:4px}
header p{font-size:13px;color:#666}
.trophy{font-size:38px;display:block;margin-bottom:6px}
.btn{padding:7px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0f0f0}.btn:active{transform:scale(.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.btn-primary:hover{background:#333}
.btn-success{background:#16a34a;color:#fff;border-color:#16a34a}.btn-success:hover{background:#15803d}
.btn-sm{padding:4px 10px;font-size:11px}
.view{display:none}.view.active{display:block}
/* Groups */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:14px}
.group-card{background:#fff;border:1px solid #e5e5e5;border-radius:9px;overflow:hidden}
.group-header{padding:5px 9px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#f8f8f6;color:#666;border-bottom:1px solid #e5e5e5}
.group-team{display:flex;align-items:center;gap:6px;padding:5px 9px;font-size:11.5px;border-top:1px solid #f0f0f0;cursor:pointer;transition:background .1s;user-select:none}
.group-team:hover{background:#f8f8f6}
.group-team.no-pointer{cursor:default}.group-team.no-pointer:hover{background:transparent}
.tf{font-size:13px;flex-shrink:0;line-height:1}.tn{flex:1;color:#1a1a1a}.tr{font-size:10px;min-width:18px;text-align:right;font-weight:700}
.rank-1 .tn{font-weight:600}.rank-1 .tr{color:#1a1a1a}
.rank-2 .tr{color:#555}
.rank-3 .tn{color:#d97706;font-weight:500}.rank-3 .tr{color:#d97706}
.rank-4 .tn{color:#bbb;text-decoration:line-through}.rank-4 .tr{color:#bbb}
/* Points editor */
.pts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:14px}
.pts-card{background:#fff;border:1px solid #e5e5e5;border-radius:9px;overflow:hidden}
.pts-header{padding:5px 9px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#f8f8f6;color:#666;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.pts-row{display:flex;align-items:center;gap:6px;padding:5px 9px;font-size:11.5px;border-top:1px solid #f0f0f0}
.pts-flag{font-size:13px;flex-shrink:0}.pts-name{flex:1;color:#1a1a1a}
.pts-input{width:44px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;text-align:center;font-size:12px;font-family:inherit;outline:none}
.pts-input:focus{border-color:#1a1a1a}
.pts-rank{font-size:10px;font-weight:700;min-width:16px;text-align:right}
.pts-rank.r1{color:#1a1a1a}.pts-rank.r2{color:#555}.pts-rank.r3{color:#d97706}.pts-rank.r4{color:#bbb}
/* Thirds */
.thirds-table{width:100%;border-collapse:collapse;background:#fff;border-radius:9px;overflow:hidden;border:1px solid #e5e5e5;margin-bottom:14px}
.thirds-table th{padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#f8f8f6;color:#666;border-bottom:1px solid #e5e5e5;text-align:left}
.thirds-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.thirds-table tr:last-child td{border-bottom:none}
.thirds-table tr.passing td{background:#f0fdf4}
.thirds-table tr.tie-row td{background:#fffbeb}
.thirds-table tr.eliminated td{background:#fef2f2;opacity:.65}
.pts-inp2{width:50px;padding:4px 7px;border:1px solid #ddd;border-radius:5px;text-align:center;font-size:12px;font-family:inherit;outline:none}
.pts-inp2:focus{border-color:#d97706}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;min-width:58px;text-align:center}
.badge-pass{background:#dcfce7;color:#15803d}
.badge-out{background:#fee2e2;color:#dc2626}
.badge-tie{background:#fef3c7;color:#d97706}
.badge-empty{background:#f3f4f6;color:#aaa}
/* Bracket */
.bracket-outer{overflow-x:auto;padding-bottom:6px}
.bracket-inner{display:flex;gap:5px;min-width:880px;align-items:stretch}
.round-col{display:flex;flex-direction:column;flex:1;min-width:0}
.round-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;text-align:center;padding:3px 0 6px}
.matches-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:3px}
.match-box{background:#fff;border:1px solid #e5e5e5;border-radius:7px;overflow:hidden;cursor:pointer;transition:border-color .1s}
.match-box:hover{border-color:#999}
.mt{display:flex;align-items:center;gap:5px;padding:5px 7px;font-size:10.5px;min-height:26px}
.mt+.mt{border-top:1px solid #f0f0f0}
.mt.win{background:#f0fdf4}.mt.win .mn{font-weight:600;color:#15803d}
.mt.lose .mn{color:#ccc}
.mf{font-size:12px;flex-shrink:0;line-height:1}.mn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a1a}
.mt.lose .mn{color:#ccc}
.champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;min-width:84px;flex-shrink:0}
.champ-t{font-size:26px;margin:6px 0 3px}
.champ-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.champ-n{font-size:11px;font-weight:600;text-align:center;color:#1a1a1a;min-height:16px}
/* Steps */
.steps{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #ddd;color:#aaa;background:#fff;flex-shrink:0}
.step-dot.active{border-color:#1a1a1a;color:#1a1a1a}
.step-dot.done{border-color:#16a34a;background:#16a34a;color:#fff}
.step-lbl{font-size:9px;color:#888;margin-top:1px;text-align:center;white-space:nowrap}
.step-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.nav{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
.info{font-size:12px;color:#666;margin-bottom:10px;padding:7px 11px;background:#fffbeb;border:1px solid #fde68a;border-radius:7px}
.share-box{background:#fff;border:1px solid #e5e5e5;border-radius:11px;padding:18px;margin-bottom:14px;text-align:center}
.share-box h2{font-size:17px;font-weight:600;margin-bottom:5px}
.share-box p{font-size:12px;color:#666;margin-bottom:14px}
.share-url{padding:9px 12px;background:#f8f8f6;border:1px solid #e5e5e5;border-radius:7px;font-size:11px;word-break:break-all;margin-bottom:10px;color:#333;text-align:left}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tag-green{background:#dcfce7;color:#15803d}
.tag-amber{background:#fef3c7;color:#d97706}
.tag-gray{background:#f3f4f6;color:#555}
.name-input{width:100%;max-width:300px;padding:9px 13px;border:1px solid #ddd;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:11px}
.name-input:focus{border-color:#1a1a1a}
.tabs{display:flex;gap:3px;border-bottom:1px solid #ddd;margin-bottom:14px}
.tab{padding:7px 15px;font-size:13px;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;color:#666;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.section-h{font-size:13px;font-weight:600;margin-bottom:8px;color:#444}
</style>
</head>
<body>
<div class="container">
<header>
  <span class="trophy">🏆</span>
  <h1>Dünya Kupası 2026 — Tahmin Oyunu</h1>
  <p>Puan gir · 3.'leri belirle · Turnuva ağacını oluştur · Linkini paylaş</p>
</header>

<!-- HOME -->
<div id="screen-home" class="view active">
  <div style="max-width:340px;margin:0 auto;padding:12px 0">
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:#555;display:block;margin-bottom:5px">Adın nedir?</label>
      <input class="name-input" id="player-name" placeholder="Adını gir..." maxlength="24">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px" onclick="startGame()">Tahmine Başla →</button>
    <div style="text-align:center;margin-top:10px">
      <button class="btn btn-sm" onclick="loadFromURL()">📎 Paylaşılan tahmini görüntüle</button>
    </div>
  </div>
</div>

<!-- PREDICT -->
<div id="screen-predict" class="view">
  <div class="steps" id="steps-bar"></div>
  <div id="predict-content"></div>
  <div class="nav" id="predict-nav"></div>
</div>

<!-- RESULT -->
<div id="screen-result" class="view">
  <div class="share-box">
    <div style="font-size:30px;margin-bottom:7px">🎉</div>
    <h2>Tahmin hazır!</h2>
    <p>Linki kopyalayıp arkadaşlarınla paylaş.<br>Onlar da kendi tahminlerini yapabilir.</p>
    <div class="share-url" id="share-url-box">—</div>
    <button class="btn btn-primary" onclick="copyURL()" style="margin-right:7px">🔗 Linki Kopyala</button>
    <button class="btn" onclick="viewFull()">👁 Tahmini Görüntüle</button>
  </div>
  <div class="nav"><button class="btn" onclick="startOver()">🔄 Yeni Tahmin Yap</button></div>
</div>

<!-- VIEW -->
<div id="screen-view" class="view">
  <div style="margin-bottom:14px">
    <div style="font-size:19px;font-weight:600" id="view-name"></div>
    <div style="font-size:12px;color:#666;margin-top:2px" id="view-champ-line"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="viewTab('groups',this)">Gruplar</button>
    <button class="tab" onclick="viewTab('thirds',this)">3. Sıra</button>
    <button class="tab" onclick="viewTab('bracket',this)">Turnuva Ağacı</button>
  </div>
  <div id="view-groups-tab" class="view active"><div class="groups-grid" id="view-groups-grid"></div></div>
  <div id="view-thirds-tab" class="view"><table class="thirds-table" id="view-thirds-table"></table></div>
  <div id="view-bracket-tab" class="view"><div class="bracket-outer"><div class="bracket-inner" id="view-bracket-inner"></div></div></div>
  <div class="nav">
    <button class="btn" onclick="startOver()">🏠 Ana Sayfa</button>
    <button class="btn btn-primary" onclick="startGame()">➕ Kendi Tahminini Yap</button>
  </div>
</div>
</div>

function lookupAnnexC(passingGroups){
  // passingGroups: array of 8 group letters
  const key=passingGroups.slice().sort().join('');
  const row=AC[key];
  if(!row) return null;
  // Returns object: {winner_A:grp, winner_B:grp, winner_D:grp, winner_E:grp, winner_G:grp, winner_I:grp, winner_K:grp, winner_L:grp}
  const slots=['A','B','D','E','G','I','K','L'];
  const result={};
  slots.forEach((s,i)=>{ result['1'+s]=row[i]; });
  return result;
}

let playerName='',groups={},teamPts={},thirds=[],bracket={},currentStep=0;

function initGroups(){
  const g={};
  GK.forEach(k=>{g[k]=GD[k].map((t,i)=>({flag:t[0],name:t[1],rank:i+1}));});
  return g;
}
function initBracket(){
  return{
    r32:Array(16).fill(null).map(()=>({t1:{flag:'',name:'?'},t2:{flag:'',name:'?'},winner:null})),
    r16:Array(8).fill(null).map(()=>({t1:{flag:'',name:'?'},t2:{flag:'',name:'?'},winner:null})),
    qf:Array(4).fill(null).map(()=>({t1:{flag:'',name:'?'},t2:{flag:'',name:'?'},winner:null})),
    sf:Array(2).fill(null).map(()=>({t1:{flag:'',name:'?'},t2:{flag:'',name:'?'},winner:null})),
    fin:{t1:{flag:'',name:'?'},t2:{flag:'',name:'?'},winner:null}
  };
}
function getByRank(g,r){return groups[g].find(t=>t.rank===r+1)||{flag:'',name:'?'};}
function showScreen(id){document.querySelectorAll('.view[id^="screen-"]').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}

function startGame(){
  const inp=document.getElementById('player-name');
  const n=inp?inp.value.trim():'';
  if(!n){if(inp){inp.focus();inp.style.borderColor='#ef4444';setTimeout(()=>inp.style.borderColor='',1200);}return;}
  playerName=n;groups=initGroups();bracket=initBracket();thirds=[];teamPts={};
  showStep(0);showScreen('predict');
}
function startOver(){showScreen('home');}

/* ---- RENDER GROUPS EDITOR ---- */
function renderGroupsEditor(cId,grpData,editable){
  const c=document.getElementById(cId);if(!c)return;c.innerHTML='';
  GK.forEach(g=>{
    const card=document.createElement('div');card.className='group-card';
    card.innerHTML=`<div class="group-header">Grup ${g}</div>`;
    [...grpData[g]].sort((a,b)=>a.rank-b.rank).forEach(t=>{
      const row=document.createElement('div');
      row.className='group-team rank-'+t.rank+(editable?'':' no-pointer');
      const lbl=t.rank===1?'1.':t.rank===2?'2.':t.rank===3?'3.':'4.';
      row.innerHTML=`<span class="tf">${t.flag}</span><span class="tn">${t.name}</span><span class="tr">${lbl}</span>`;
      if(editable)row.onclick=()=>{
        const cur=t.rank,next=cur>=4?1:cur+1;
        const o=grpData[g].find(x=>x.rank===next&&x!==t);
        if(o)o.rank=cur;
        t.rank=next;
        // teamPts'i rank'e göre güncelle: 1.->6, 2.->3, 3.->1, 4.->0
        const rankPts=[6,3,1,0];
        grpData[g].forEach((team,origIdx)=>{
          teamPts[g+origIdx]=rankPts[team.rank-1];
        });
        renderGroupsEditor(cId,grpData,editable);
      };
      card.appendChild(row);
    });
    c.appendChild(card);
  });
}

/* ---- POINTS STEP ---- */
function renderPointsStep(){
  // Gruplar adımındaki sıralamadan teamPts'i önceden doldur (boş olanlar için)
  const rankPts=[6,3,1,0];
  GK.forEach(g=>{
    groups[g].forEach((team,origIdx)=>{
      if(teamPts[g+origIdx]===undefined || teamPts[g+origIdx]===null){
        teamPts[g+origIdx]=rankPts[team.rank-1];
      }
    });
  });
  const content=document.getElementById('predict-content');
  content.innerHTML='<div class="info">Her takım için grup aşamasında alacağını tahmin ettiğin puanı gir (0-9). Gruplar adımındaki sıralamandan otomatik dolduruldu, istersen değiştirebilirsin.</div><div class="pts-grid" id="pts-g"></div>';
  renderPointsGrid();
}

function renderPointsGrid(){
  const c=document.getElementById('pts-g');if(!c)return;c.innerHTML='';
  GK.forEach(g=>{
    const card=document.createElement('div');card.className='pts-card';
    card.innerHTML=`<div class="pts-header"><span>Grup ${g}</span></div>`;
    GD[g].forEach((td,origIdx)=>{
      const key=g+origIdx;
      const pts=teamPts[key]!==undefined?teamPts[key]:'';
      // rank based on pts
      const row=document.createElement('div');row.className='pts-row';
      row.innerHTML=`<span class="pts-flag">${td[0]}</span><span class="pts-name">${td[1]}</span><input class="pts-input" type="number" min="0" max="9" step="1" value="${pts}" placeholder="—" data-key="${key}"><span class="pts-rank" id="prank-${key}"></span>`;
      card.appendChild(row);
    });
    c.appendChild(card);
  });
  // events
  c.querySelectorAll('.pts-input').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const v=parseInt(e.target.value);
      teamPts[e.target.dataset.key]=isNaN(v)||v<0||v>9?null:v;
      updateGroupRanksFromPts();
    });
  });
  updateGroupRanksFromPts();
}

function updateGroupRanksFromPts(){
  GK.forEach(g=>{
    const entries=GD[g].map((td,i)=>({idx:i,pts:teamPts[g+i]||0})).sort((a,b)=>b.pts-a.pts||(a.idx-b.idx));
    entries.forEach((e,rank)=>{
      groups[g][e.idx].rank=rank+1;
      const el=document.getElementById('prank-'+g+e.idx);
      if(el){el.textContent=rank===0?'1.':rank===1?'2.':rank===2?'3.':'4.';el.className='pts-rank '+(rank===0?'r1':rank===1?'r2':rank===2?'r3':'r4');}
    });
  });
}

/* ---- THIRDS STEP ---- */
function buildThirds(){
  thirds=GK.map(g=>{const t=groups[g].find(x=>x.rank===3)||{flag:'',name:'?'};return{group:g,flag:t.flag,name:t.name,pts:teamPts[g+(GD[g].findIndex(x=>x[1]===t.name))]||0};});
}

function calcThirdsStatus(){
  const sorted=[...thirds].sort((a,b)=>b.pts-a.pts||(a.group.localeCompare(b.group)));
  const cutoff=sorted.length>=8?sorted[7].pts:-1;
  return thirds.map(t=>{
    if(t.pts>cutoff)return{...t,status:'pass'};
    if(t.pts===cutoff)return{...t,status:'tie'};
    return{...t,status:'out'};
  });
}

function renderThirdsTable(cId,thirdsData,editable){
  const tbl=document.getElementById(cId);if(!tbl)return;
  const statuses=editable?calcThirdsStatus():thirdsData;
  const sorted=[...statuses].sort((a,b)=>b.pts-a.pts||(a.group.localeCompare(b.group)));
  tbl.innerHTML=`<thead><tr><th>#</th><th>Grup</th><th>Takım</th><th style="text-align:center">Puan</th><th style="text-align:center">Durum</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  sorted.forEach((t,i)=>{
    const tr=document.createElement('tr');
    tr.className=t.status==='pass'?'passing':t.status==='tie'?'tie-row':'eliminated';
    const badge=t.status==='pass'?'<span class="badge badge-pass">✓ Geçti</span>':t.status==='tie'?'<span class="badge badge-tie">~ Berabere</span>':'<span class="badge badge-out">✗ Elendi</span>';
    if(editable){
      tr.innerHTML=`<td style="color:#aaa;font-weight:700">${i+1}</td><td><strong>Grup ${t.group}</strong></td><td>${t.flag} ${t.name}</td><td style="text-align:center"><input class="pts-inp2" type="number" min="0" max="9" value="${t.pts}" data-g="${t.group}"></td><td style="text-align:center">${badge}</td>`;
    }else{
      tr.innerHTML=`<td style="color:#aaa;font-weight:700">${i+1}</td><td><strong>Grup ${t.group}</strong></td><td>${t.flag} ${t.name}</td><td style="text-align:center;font-weight:700">${t.pts}</td><td style="text-align:center">${badge}</td>`;
    }
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  if(editable){
    tbody.querySelectorAll('.pts-inp2').forEach(inp=>{
      inp.addEventListener('input',e=>{
        const g=e.target.dataset.g;
        const v=parseInt(e.target.value);
        const idx=thirds.findIndex(t=>t.group===g);
        if(idx>=0)thirds[idx].pts=isNaN(v)?0:Math.max(0,Math.min(9,v));
        renderThirdsTable(cId,null,true);
        // also update in teamPts
        const origIdx=GD[g].findIndex((t,i)=>groups[g][i]&&groups[g][i].rank===3);
        if(origIdx>=0)teamPts[g+origIdx]=isNaN(v)?0:v;
      });
    });
  }
}

/* ---- BRACKET ---- */
function rebuildR32(){
  // Resmi FIFA Son 32 eşleşmeleri (Wikipedia/ESPN kaynaklı)
  // r32[0..7] = sabit 1. vs 2. maçlar
  // r32[8..15] = 1. vs 3.sıra maçları (Annex C ile belirlenir)
  // Sabit maçlar (grup 1. veya 2.'leri arasında):
  // M73: A2 vs B2  | M75: F1 vs C2  | M76: C1 vs F2  | M78: E2 vs I2
  // M83: K2 vs L2  | M84: H1 vs J2  | M86: J1 vs H2  | M87: D2 vs G2
  const fixedMatches=[
    ['A',1,'B',1], // A2 vs B2
    ['F',0,'C',1], // F1 vs C2
    ['C',0,'F',1], // C1 vs F2
    ['E',1,'I',1], // E2 vs I2
    ['K',1,'L',1], // K2 vs L2
    ['H',0,'J',1], // H1 vs J2
    ['J',0,'H',1], // J1 vs H2
    ['D',1,'G',1], // D2 vs G2
  ];
  fixedMatches.forEach(([g1,r1,g2,r2],i)=>{
    bracket.r32[i].t1={...getByRank(g1,r1)};
    bracket.r32[i].t2={...getByRank(g2,r2)};
    bracket.r32[i].winner=null;
  });

  // 3. sıra maçları: Annex C ile
  // Her zaman calcThirdsStatus() kullan — thirds listesindeki pts'e göre
  const statuses = calcThirdsStatus();
  const passingGroups = statuses.filter(t=>t.status==='pass').map(t=>t.group);
  // Annex C slot sırası: [1A, 1B, 1D, 1E, 1G, 1I, 1K, 1L] → r32[8..15]
  const winnerVsThird = ['A','B','D','E','G','I','K','L'];

  if(passingGroups.length===8){
    const mapping = lookupAnnexC(passingGroups);
    winnerVsThird.forEach((ws,si)=>{
      const thirdGroup = mapping ? mapping['1'+ws] : null;
      const winner = getByRank(ws, 0);
      const thirdTeam = thirdGroup ? statuses.find(t=>t.group===thirdGroup) : null;
      bracket.r32[8+si].t1 = {flag: winner.flag||'', name: winner.name||'?'};
      bracket.r32[8+si].t2 = thirdTeam ? {flag: thirdTeam.flag||'', name: thirdTeam.name||'?'} : {flag:'', name:'3. Sıra'};
      bracket.r32[8+si].winner = null;
    });
  } else {
    // Tam 8 geçen yok — en iyi 8'i puana göre sırala, aynı gruptan eşleşmeyi engelle
    const sorted = [...statuses].sort((a,b)=>b.pts-a.pts);
    const best8 = sorted.slice(0,8);
    const used = new Set();
    winnerVsThird.forEach((ws,si)=>{
      const winner = getByRank(ws, 0);
      // Aynı gruptan olmayan ilk takımı bul
      let thirdTeam = best8.find(t=>t.group!==ws && !used.has(t.group));
      if(!thirdTeam) thirdTeam = best8.find(t=>!used.has(t.group));
      if(!thirdTeam) thirdTeam = {flag:'', name:'3. Sıra'};
      else used.add(thirdTeam.group);
      bracket.r32[8+si].t1 = {flag: winner.flag||'', name: winner.name||'?'};
      bracket.r32[8+si].t2 = {flag: thirdTeam.flag||'', name: thirdTeam.name||'?'};
      bracket.r32[8+si].winner = null;
    });
  }
}

function renderStepBracket(step){
  const inner=document.getElementById('sb');if(!inner)return;inner.innerHTML='';
  const allR=[{l:'Son 32',d:bracket.r32,k:'r32'},{l:'Son 16',d:bracket.r16,k:'r16'},{l:'Ceyrek',d:bracket.qf,k:'qf'},{l:'Yari Final',d:bracket.sf,k:'sf'}];
  const showCount=step-2;
  allR.slice(0,showCount).forEach(({l,d,k})=>{
    const col=document.createElement('div');col.className='round-col';
    const lbl=document.createElement('div');lbl.className='round-lbl';lbl.textContent=l;col.appendChild(lbl);
    const mc=document.createElement('div');mc.className='matches-col';
    d.forEach((m,i)=>mc.appendChild(makeMatchEl(m,k,i,true)));
    col.appendChild(mc);inner.appendChild(col);
  });
  appendChampCol(inner,bracket,step===7);
  const w=bracket.fin.winner?(bracket.fin.winner===1?bracket.fin.t1:bracket.fin.t2):null;
  const cn=inner.querySelector('.champ-n');
  if(cn)cn.textContent=w?w.flag+' '+w.name:'—';
}

function makeMatchEl(m,round,idx,interactive){
  const d=document.createElement('div');d.className='match-box';
  [[m.t1,1],[m.t2,2]].forEach(([t,tn])=>{
    const row=document.createElement('div');
    row.className='mt'+(m.winner===tn?' win':m.winner&&m.winner!==tn?' lose':'');
    row.innerHTML=`<span class="mf">${t.flag||''}</span><span class="mn">${t.name||'?'}</span>`;
    if(interactive)row.onclick=()=>pickWinner(round,idx,tn);
    d.appendChild(row);
  });
  return d;
}

function appendChampCol(inner,br,interactive){
  const cc=document.createElement('div');cc.className='champ-col';
  const fl=document.createElement('div');fl.className='round-lbl';fl.textContent='Final';cc.appendChild(fl);
  // Final maçı her zaman tıklanabilir
  const fb=makeMatchEl(br.fin,'fin',0,true);fb.style.marginBottom='5px';cc.appendChild(fb);
  const ti=document.createElement('div');ti.className='champ-t';ti.textContent='🏆';
  const cl=document.createElement('div');cl.className='champ-l';cl.textContent='Şampiyon';
  const cn=document.createElement('div');cn.className='champ-n';
  const w=br.fin.winner?(br.fin.winner===1?br.fin.t1:br.fin.t2):null;
  cn.textContent=w?w.flag+' '+w.name:'—';
  cc.appendChild(ti);cc.appendChild(cl);cc.appendChild(cn);inner.appendChild(cc);
}

function pickWinner(round,idx,tnum){
  const rounds={r32:bracket.r32,r16:bracket.r16,qf:bracket.qf,sf:bracket.sf};
  const m = round==='fin' ? bracket.fin : rounds[round][idx];
  if(!m) return;
  m.winner = tnum;
  const w = {...(tnum===1 ? m.t1 : m.t2)};

  // Final seçilince şampiyonu güncelle ve çiz
  if(round==='fin'){
    renderStepBracket(currentStep);
    return;
  }
  // Bir sonraki tura taşı
  const next = {r32:'r16', r16:'qf', qf:'sf', sf:'fin'};
  const nextRound = next[round];
  if(!nextRound){ renderStepBracket(currentStep); return; }

  if(nextRound==='fin'){
    // sf[0] winner -> fin.t1, sf[1] winner -> fin.t2
    bracket.fin[idx===0?'t1':'t2'] = w;
    bracket.fin.winner = null;
  } else {
    const nextMatches = rounds[nextRound];
    const matchIdx = Math.floor(idx/2);
    const slot = idx%2===0 ? 't1' : 't2';
    if(nextMatches[matchIdx]){
      nextMatches[matchIdx][slot] = w;
      nextMatches[matchIdx].winner = null;
      // Cascade clear downstream
      cascadeClear(nextRound, matchIdx);
    }
  }
  renderStepBracket(currentStep);
}

function cascadeClear(round, idx){
  const next = {r16:'qf', qf:'sf', sf:'fin'};
  const rounds = {r16:bracket.r16, qf:bracket.qf, sf:bracket.sf};
  const nextRound = next[round];
  if(!nextRound) return;
  if(nextRound==='fin'){
    bracket.fin[idx===0?'t1':'t2'] = {flag:'',name:'?'};
    bracket.fin.winner = null;
  } else {
    const matchIdx = Math.floor(idx/2);
    const slot = idx%2===0 ? 't1' : 't2';
    const nextMatches = rounds[nextRound];
    if(nextMatches && nextMatches[matchIdx]){
      nextMatches[matchIdx][slot] = {flag:'',name:'?'};
      nextMatches[matchIdx].winner = null;
      cascadeClear(nextRound, matchIdx);
    }
  }
}

/* ---- STEPS ---- */
function showStep(step){
  currentStep=step;
  document.getElementById('steps-bar').innerHTML=STEP_LABELS.map((s,i)=>`<div class="step-item"><div class="step-dot${i===step?' active':i<step?' done':''}">${i<step?'✓':i+1}</div><div class="step-lbl">${s}</div></div>`).join('');
  const content=document.getElementById('predict-content');
  const nav=document.getElementById('predict-nav');
  content.innerHTML='';nav.innerHTML='';

  if(step===0){
    content.innerHTML=`<div class="info">Her takıma tıklayarak sırasını değiştir. <span class="tag tag-green">1./2.</span> otomatik geçer · <span class="tag tag-amber">3.</span> puan sıralamasına göre değerlendirilir · <span class="tag tag-gray">4.</span> elenir.</div><div class="groups-grid" id="pg"></div>`;
    renderGroupsEditor('pg',groups,true);
    nav.innerHTML=`<button class="btn btn-primary" onclick="goStep(1)">Devam → Puanlar</button>`;
  }
  else if(step===1){
    renderPointsStep();
    nav.innerHTML=`<button class="btn" onclick="goStep(0)">← Geri</button><button class="btn btn-primary" onclick="goStep(2)">Devam → 3. Sıra</button>`;
  }
  else if(step===2){
    buildThirds();
    content.innerHTML=`<div class="info">Puanlarına göre en iyi 8 takım Son 32'ye geçer. Berabere puan durumunda sarı uyarı çıkar — FIFA kura çeker. Gerekirse puanı düzenleyebilirsin.</div><table class="thirds-table" id="thirds-tbl"></table>`;
    renderThirdsTable('thirds-tbl',null,true);
    nav.innerHTML=`<button class="btn" onclick="goStep(1)">← Geri</button><button class="btn btn-primary" onclick="goStep(3)">Devam → Son 32</button>`;
  }
  else if(step>=3&&step<=7){
    if(step===3){
      buildThirds();
      const statuses=calcThirdsStatus();
      thirds.forEach(t=>{const s=statuses.find(x=>x.group===t.group);if(s)t.status=s.status;});
      rebuildR32();
    }
    content.innerHTML=`<div class="info">Kazananı seçmek için takıma tıkla.</div><div class="bracket-outer"><div class="bracket-inner" id="sb"></div></div>`;
    renderStepBracket(step);
    const isLast=step===7;
    nav.innerHTML=`<button class="btn" onclick="goStep(${step-1})">← Geri</button><button class="btn ${isLast?'btn-success':'btn-primary'}" onclick="goStep(${step+1})">${isLast?'✅ Kaydet':'Devam →'}</button>`;
  }
}

function goStep(step){
  if(step<0||step>8)return;
  if(step===8){savePrediction();return;}
  showStep(step);
}

/* ---- SAVE & SHARE ---- */
function savePrediction(){
  updateGroupRanksFromPts();
  buildThirds();
  const statuses=calcThirdsStatus();
  thirds.forEach(t=>{const s=statuses.find(x=>x.group===t.group);if(s)t.status=s.status;});
  const champ=bracket.fin.winner?(bracket.fin.winner===1?bracket.fin.t1:bracket.fin.t2):null;
  const data={name:playerName,groups:JSON.parse(JSON.stringify(groups)),teamPts:JSON.parse(JSON.stringify(teamPts)),thirds:JSON.parse(JSON.stringify(thirds)),bracket:JSON.parse(JSON.stringify(bracket)),champ:champ||{flag:'',name:'Belirsiz'}};
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url=window.location.href.split('?')[0]+'?t='+encoded;
  document.getElementById('share-url-box').textContent=url;
  showScreen('result');
}

function copyURL(){
  const url=document.getElementById('share-url-box').textContent;
  navigator.clipboard.writeText(url).then(()=>{const btn=event.target;btn.textContent='✅ Kopyalandı!';setTimeout(()=>btn.textContent='🔗 Linki Kopyala',2000);}).catch(()=>{const b=document.getElementById('share-url-box');const r=document.createRange();r.selectNode(b);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');const btn=event.target;btn.textContent='✅ Kopyalandı!';setTimeout(()=>btn.textContent='🔗 Linki Kopyala',2000);});
}
function viewFull(){const url=document.getElementById('share-url-box').textContent;const t=new URLSearchParams('?'+(url.split('?')[1]||'')).get('t');if(t)displayPrediction(t);}

      const tbody=document.createElement('tbody');
      sorted.forEach((t,i)=>{
        const tr=document.createElement('tr');
        tr.className=t.status==='pass'?'passing':t.status==='tie'?'tie-row':'eliminated';

        tr.innerHTML='<td style="color:#aaa;font-weight:700">'+(i+1)+'</td><td><strong>Grup '+t.group+'</strong></td><td>'+t.flag+' '+t.name+'</td><td style="text-align:center;font-weight:700">'+t.pts+'</td><td style="text-align:center">'+badge+'</td>';

}

function loadFromURL(){

  if(t) displayPrediction(t);
  else alert("URL'de tahmin bulunamadı.");
}

window.addEventListener('load',()=>{
  const t=new URLSearchParams(window.location.search).get('t');
  if(t) displayPrediction(t);
});
</script>
