<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Kupası 2026 — Tahmin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.container{max-width:980px;margin:0 auto;padding:16px}
header{text-align:center;padding:16px 0 12px}
header h1{font-size:22px;font-weight:600;margin-bottom:3px}
header p{font-size:12px;color:#666}
.trophy{font-size:34px;display:block;margin-bottom:5px}
.btn{padding:7px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0f0f0}.btn:active{transform:scale(.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.btn-primary:hover{background:#333}
.btn-success{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-sm{padding:4px 10px;font-size:11px}
.view{display:none}.view.active{display:block}
/* Steps */
.steps{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #ddd;color:#aaa;background:#fff}
.step-dot.active{border-color:#1a1a1a;color:#1a1a1a}
.step-dot.done{border-color:#16a34a;background:#16a34a;color:#fff}
.step-lbl{font-size:9px;color:#888;text-align:center;white-space:nowrap}
.nav{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
.info{font-size:12px;color:#666;margin-bottom:10px;padding:7px 11px;background:#fffbeb;border:1px solid #fde68a;border-radius:7px}
/* Group matches */
.group-section{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-bottom:10px}
.group-section-header{padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#f8f8f6;color:#555;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.match-row{display:flex;align-items:center;padding:8px 12px;border-top:1px solid #f0f0f0;gap:8px}
.match-teams{flex:1;display:flex;align-items:center;gap:6px;font-size:13px}
.match-team{display:flex;align-items:center;gap:5px}
.match-flag{font-size:14px;line-height:1}
.match-name{font-size:12px;color:#1a1a1a}
.match-vs{font-size:11px;color:#aaa;flex-shrink:0}
.match-result{display:flex;gap:4px;flex-shrink:0}
.res-btn{width:32px;height:28px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .1s;color:#555}
.res-btn:hover{background:#f0f0f0}
.res-btn.active-w{background:#16a34a;color:#fff;border-color:#16a34a}
.res-btn.active-d{background:#d97706;color:#fff;border-color:#d97706}
.res-btn.active-l{background:#dc2626;color:#fff;border-color:#dc2626}
/* Standings */
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{padding:5px 8px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#888;border-bottom:1px solid #e5e5e5;text-align:left}
.standings-table th:not(:first-child):not(:nth-child(2)){text-align:center}
.standings-table td{padding:5px 8px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.standings-table td:not(:first-child):not(:nth-child(2)){text-align:center}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.q1{background:#f0fdf4}
.standings-table tr.q2{background:#f0fdf4}
.standings-table tr.q3{background:#fffbeb}
.standings-table tr.out{background:#fff}
.rank-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;text-align:center;line-height:18px}
.rb1{background:#1a1a1a;color:#fff}
.rb2{background:#555;color:#fff}
.rb3{background:#d97706;color:#fff}
.rb4{background:#e5e5e5;color:#888}
.team-cell{display:flex;align-items:center;gap:6px}
/* Bracket */
.bracket-outer{overflow-x:auto;padding-bottom:6px}
.bracket-inner{display:flex;gap:5px;min-width:860px;align-items:stretch}
.round-col{display:flex;flex-direction:column;flex:1;min-width:0}
.round-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;text-align:center;padding:3px 0 6px}
.matches-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:3px}
.match-box{background:#fff;border:1px solid #e5e5e5;border-radius:7px;overflow:hidden;cursor:pointer}
.match-box:hover{border-color:#999}
.mt{display:flex;align-items:center;gap:5px;padding:5px 7px;font-size:11px;min-height:26px}
.mt+.mt{border-top:1px solid #f0f0f0}
.mt.win{background:#f0fdf4}.mt.win .mn{font-weight:600;color:#15803d}
.mt.lose .mn{color:#ccc}
.mf{font-size:12px;flex-shrink:0}.mn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a1a}
.mt.lose .mn{color:#ccc}
.champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;min-width:84px;flex-shrink:0}
.champ-t{font-size:26px;margin:6px 0 3px}
.champ-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.champ-n{font-size:11px;font-weight:600;text-align:center;color:#1a1a1a;min-height:16px}
/* Share */
.share-box{background:#fff;border:1px solid #e5e5e5;border-radius:11px;padding:18px;margin-bottom:14px;text-align:center}
.share-box h2{font-size:17px;font-weight:600;margin-bottom:5px}
.share-box p{font-size:12px;color:#666;margin-bottom:14px}
.share-url{padding:9px 12px;background:#f8f8f6;border:1px solid #e5e5e5;border-radius:7px;font-size:11px;word-break:break-all;margin-bottom:10px;color:#333;text-align:left}
.name-input{width:100%;max-width:300px;padding:9px 13px;border:1px solid #ddd;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:11px}
.name-input:focus{border-color:#1a1a1a}
.tabs{display:flex;gap:3px;border-bottom:1px solid #ddd;margin-bottom:12px}
.tab{padding:7px 14px;font-size:13px;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;color:#666;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.progress-bar{height:4px;background:#e5e5e5;border-radius:2px;margin-bottom:10px}
.progress-fill{height:100%;background:#16a34a;border-radius:2px;transition:width .3s}
.thirds-table{width:100%;border-collapse:collapse;background:#fff;border-radius:9px;overflow:hidden;border:1px solid #e5e5e5;margin-bottom:12px}
.thirds-table th{padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#f8f8f6;color:#666;border-bottom:1px solid #e5e5e5;text-align:left}
.thirds-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid #f0f0f0}
.thirds-table tr:last-child td{border-bottom:none}
.thirds-table tr.pass-row td{background:#f0fdf4}
.thirds-table tr.out-row td{background:#fef2f2;opacity:.7}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;min-width:55px;text-align:center}
.badge-pass{background:#dcfce7;color:#15803d}
.badge-out{background:#fee2e2;color:#dc2626}
.badge-tie{background:#fef3c7;color:#d97706}
</style>
</head>
<body>
<div class="container">
<header>
  <span class="trophy">🏆</span>
  <h1>Dünya Kupası 2026 — Tahmin</h1>
  <p>Maç maç sonuç seç · Puan tablosu oluşsun · Turnuva ağacını belirle</p>
</header>

<div id="screen-home" class="view active">
  <div style="max-width:340px;margin:0 auto;padding:12px 0">
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:#555;display:block;margin-bottom:5px">Adın nedir?</label>
      <input class="name-input" id="player-name" placeholder="Adını gir..." maxlength="24">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px" onclick="startGame()">Tahmine Başla →</button>
    <div style="text-align:center;margin-top:10px">
      <button class="btn btn-sm" onclick="loadFromURL()">📎 Paylaşılan tahmini görüntüle</button>
    </div>
  </div>
</div>

<div id="screen-predict" class="view">
  <div class="steps" id="steps-bar"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="predict-content"></div>
  <div class="nav" id="predict-nav"></div>
</div>

<div id="screen-result" class="view">
  <div class="share-box">
    <div style="font-size:30px;margin-bottom:7px">🎉</div>
    <h2>Tahmin hazır!</h2>
    <p>Linki arkadaşlarınla paylaş.</p>
    <div class="share-url" id="share-url-box">—</div>
    <button class="btn btn-primary" onclick="copyURL()" style="margin-right:7px">🔗 Linki Kopyala</button>
    <button class="btn" onclick="viewFull()">👁 Görüntüle</button>
  </div>
  <div class="nav"><button class="btn" onclick="startOver()">🔄 Yeni Tahmin</button></div>
</div>

<div id="screen-view" class="view">
  <div style="margin-bottom:12px">
    <div style="font-size:18px;font-weight:600" id="view-name"></div>
    <div style="font-size:12px;color:#666;margin-top:2px" id="view-champ-line"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="viewTab('groups',this)">Gruplar</button>
    <button class="tab" onclick="viewTab('thirds',this)">3. Sıra</button>
    <button class="tab" onclick="viewTab('bracket',this)">Ağaç</button>
  </div>
  <div id="view-groups-tab" class="view active" id="vgt"></div>
  <div id="view-thirds-tab" class="view"><table class="thirds-table" id="view-thirds-tbl"></table></div>
  <div id="view-bracket-tab" class="view"><div class="bracket-outer"><div class="bracket-inner" id="view-bracket-inner"></div></div></div>
  <div class="nav">
    <button class="btn" onclick="startOver()">🏠 Ana Sayfa</button>
    <button class="btn btn-primary" onclick="startGame()">➕ Yeni Tahmin</button>
  </div>
</div>
</div>

const AC=buildAC();

function lookupAnnexC(pg){
  const key=pg.slice().sort().join('');
  const row=AC[key];
  if(!row)return null;
  const slots=['A','B','D','E','G','I','K','L'];
  const res={};
  slots.forEach((s,i)=>res['1'+s]=row[i]);
  return res;
}

// Puan hesapla
function calcStandings(g){
  const teams=GD[g].map((t,i)=>({idx:i,flag:t[0],name:t[1],pts:0,w:0,d:0,l:0,gf:0,ga:0,h2h:{}}));
  MATCH_PAIRS.forEach(([a,b])=>{
    const res=results[g][a+'_'+b];
    if(!res)return;
    if(res==='W'){teams[a].pts+=3;teams[a].w++;teams[b].l++;}
    else if(res==='D'){teams[a].pts+=1;teams[b].pts+=1;teams[a].d++;teams[b].d++;}
    else if(res==='L'){teams[b].pts+=3;teams[b].w++;teams[a].l++;}
    // h2h tracking
    if(!teams[a].h2h[b])teams[a].h2h[b]={pts:0};
    if(!teams[b].h2h[a])teams[b].h2h[a]={pts:0};
    if(res==='W'){teams[a].h2h[b].pts+=3;}
    else if(res==='D'){teams[a].h2h[b].pts+=1;teams[b].h2h[a].pts+=1;}
    else if(res==='L'){teams[b].h2h[a].pts+=3;}
  });
  // Sort: pts desc, h2h pts desc, gd desc, gf desc
  teams.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    // h2h pts between these two
    const ah=a.h2h[b.idx]?a.h2h[b.idx].pts:0;
    const bh=b.h2h[a.idx]?b.h2h[a.idx].pts:0;
    if(bh!==ah)return bh-ah;
    return (b.gf-b.ga)-(a.gf-a.ga);
  });
  return teams;
}

function getThirds(){
  return GK.map(g=>{
    const st=calcStandings(g);
    const t=st[2]; // 3. sıra
    return{group:g,flag:t.flag,name:t.name,pts:t.pts,w:t.w,d:t.d,l:t.l};
  });
}

function getThirdsStatus(thirdsArr){
  const sorted=[...thirdsArr].sort((a,b)=>b.pts-a.pts||(b.w-a.w)||(a.group.localeCompare(b.group)));
  const cutoff=sorted.length>=8?sorted[7].pts:-1;
  return thirdsArr.map(t=>{
    if(t.pts>cutoff)return{...t,status:'pass'};
    if(t.pts===cutoff)return{...t,status:'tie'};
    return{...t,status:'out'};
  });
}

// Steps: 0-11 = Grup A-L, 12 = 3. sıra özeti, 13-17 = bracket turları
const TOTAL_STEPS=18;
function showStep(step){
  currentStep=step;
  const pct=Math.round((step/TOTAL_STEPS)*100);
  document.getElementById('progress-fill').style.width=pct+'%';

  // Steps bar
  const labels=['A','B','C','D','E','F','G','H','I','J','K','L','3.','S32','S16','Çyr','Yrf','Final'];
  document.getElementById('steps-bar').innerHTML=labels.map((s,i)=>`<div class="step-item"><div class="step-dot${i===step?' active':i<step?' done':''}">${i<step?'✓':s}</div></div>`).join('');

  const content=document.getElementById('predict-content');
  const nav=document.getElementById('predict-nav');
  content.innerHTML='';nav.innerHTML='';

  if(step<=11){
    // Grup maçları
    const g=GK[step];
    renderGroupStep(g, content);
    const isFirst=step===0;
    const isLast=step===11;
    nav.innerHTML=`${!isFirst?'<button class="btn" onclick="goStep('+(step-1)+')">← Geri</button>':''}
    <button class="btn btn-primary" onclick="goStep('+(step+1)+')">${isLast?'3. Sıra Özeti →':'Grup '+(GK[step+1]||'')+' →'}</button>`;
  }
  else if(step===12){
    renderThirdsSummary(content);
    nav.innerHTML=`<button class="btn" onclick="goStep(11)">← Geri</button>
    <button class="btn btn-primary" onclick="goStep(13)">Turnuva Ağacı →</button>`;
  }
  else{
    if(step===13) buildBracket();
    renderBracketStep(step, content);
    const isLast=step===17;
    nav.innerHTML=`<button class="btn" onclick="goStep('+(step-1)+')">← Geri</button>
    <button class="btn ${isLast?'btn-success':'btn-primary'}" onclick="goStep('+(step+1)+')">${isLast?'✅ Kaydet':'Devam →'}</button>`;
  }
}

function buildBracket(){
  bracket=initBracket();
  // Sabit 8 maç (FIFA resmi)
  const fixed=[
    ['A',1,'B',1],['F',0,'C',1],['C',0,'F',1],['E',1,'I',1],
    ['K',1,'L',1],['H',0,'J',1],['J',0,'H',1],['D',1,'G',1]
  ];
  fixed.forEach(([g1,r1,g2,r2],i)=>{
    const s1=calcStandings(g1)[r1];
    const s2=calcStandings(g2)[r2];
    bracket.r32[i].t1={flag:s1.flag,name:s1.name};
    bracket.r32[i].t2={flag:s2.flag,name:s2.name};
  });

  // Annex C: 8 grup galibine 3. sıra
  const thirds=getThirds();
  const statuses=getThirdsStatus(thirds);
  const passingGroups=statuses.filter(t=>t.status==='pass').map(t=>t.group);
  const winnerVsThird=['A','B','D','E','G','I','K','L'];

  if(passingGroups.length===8){
    const mapping=lookupAnnexC(passingGroups);
    winnerVsThird.forEach((ws,si)=>{
      const winner=calcStandings(ws)[0];
      const thirdGroup=mapping?mapping['1'+ws]:null;
      const thirdTeam=thirdGroup?statuses.find(t=>t.group===thirdGroup):null;
      bracket.r32[8+si].t1={flag:winner.flag,name:winner.name};
      bracket.r32[8+si].t2=thirdTeam?{flag:thirdTeam.flag,name:thirdTeam.name}:{flag:'',name:'3. Sıra'};
    });
  } else {
    const sorted=[...statuses].sort((a,b)=>b.pts-a.pts);
    const used=new Set();
    winnerVsThird.forEach((ws,si)=>{
      const winner=calcStandings(ws)[0];
      let third=sorted.find(t=>t.group!==ws&&!used.has(t.group));
      if(!third)third=sorted.find(t=>!used.has(t.group));
      if(third)used.add(third.group);
      bracket.r32[8+si].t1={flag:winner.flag,name:winner.name};
      bracket.r32[8+si].t2=third?{flag:third.flag,name:third.name}:{flag:'',name:'3. Sıra'};
    });
  }
}

function renderBracketStep(step, container){
  const rLabels=['Son 32','Son 16','Çeyrek Final','Yarı Final','Final'];
  const rIdx=step-13;
  container.innerHTML=`<div class="info">${rLabels[rIdx]} — Kazanan için takıma tıkla.</div><div class="bracket-outer"><div class="bracket-inner" id="sb"></div></div>`;
  renderBracket();
}

function renderBracket(){
  const inner=document.getElementById('sb');if(!inner)return;
  inner.innerHTML='';
  const rStep=currentStep-13; // 0=r32, 1=r16, ...
  const allR=[{l:'Son 32',d:bracket.r32,k:'r32'},{l:'Son 16',d:bracket.r16,k:'r16'},{l:'Çeyrek',d:bracket.qf,k:'qf'},{l:'Yarı Final',d:bracket.sf,k:'sf'}];
  allR.slice(0,rStep+1).forEach(({l,d,k})=>{
    const col=document.createElement('div');col.className='round-col';
    const lbl=document.createElement('div');lbl.className='round-lbl';lbl.textContent=l;col.appendChild(lbl);
    const mc=document.createElement('div');mc.className='matches-col';
    d.forEach((m,i)=>mc.appendChild(makeMatch(m,k,i)));
    col.appendChild(mc);inner.appendChild(col);
  });
  // Şampiyon
  const cc=document.createElement('div');cc.className='champ-col';
  const fl=document.createElement('div');fl.className='round-lbl';fl.textContent='Final';cc.appendChild(fl);
  const fb=makeMatch(bracket.fin,'fin',0);fb.style.marginBottom='5px';cc.appendChild(fb);
  const ti=document.createElement('div');ti.className='champ-t';ti.textContent='🏆';
  const cl=document.createElement('div');cl.className='champ-l';cl.textContent='Şampiyon';
  const cn=document.createElement('div');cn.className='champ-n';
  const w=bracket.fin.winner?(bracket.fin.winner===1?bracket.fin.t1:bracket.fin.t2):null;
  cn.textContent=w?w.flag+' '+w.name:'—';
  cc.appendChild(ti);cc.appendChild(cl);cc.appendChild(cn);inner.appendChild(cc);
}

function makeMatch(m,round,idx){
  const d=document.createElement('div');d.className='match-box';
  [[m.t1,1],[m.t2,2]].forEach(([t,tn])=>{
    const row=document.createElement('div');
    row.className='mt'+(m.winner===tn?' win':m.winner&&m.winner!==tn?' lose':'');
    row.innerHTML=`<span class="mf">${t.flag||''}</span><span class="mn">${t.name||'?'}</span>`;
    row.onclick=()=>pickWinner(round,idx,tn);
    d.appendChild(row);
  });
  return d;
}

function pickWinner(round,idx,tnum){
  const rounds={r32:bracket.r32,r16:bracket.r16,qf:bracket.qf,sf:bracket.sf};
  const m=round==='fin'?bracket.fin:rounds[round][idx];
  if(!m)return;
  m.winner=tnum;
  const w={...(tnum===1?m.t1:m.t2)};
  if(round==='fin'){renderBracket();return;}
  const nextMap={r32:'r16',r16:'qf',qf:'sf',sf:'fin'};
  const nextRound=nextMap[round];
  if(nextRound==='fin'){
    bracket.fin[idx===0?'t1':'t2']=w;
    bracket.fin.winner=null;
  } else {
    const nm=rounds[nextRound];
    const qi=Math.floor(idx/2);
    const sl=idx%2===0?'t1':'t2';
    if(nm[qi]){nm[qi][sl]=w;nm[qi].winner=null;cascadeClear(nextRound,qi);}
  }
  renderBracket();
}

function cascadeClear(round,idx){
  const nextMap={r16:'qf',qf:'sf',sf:'fin'};
  const rounds={r16:bracket.r16,qf:bracket.qf,sf:bracket.sf};
  const nr=nextMap[round];
  if(!nr)return;
  if(nr==='fin'){bracket.fin[idx===0?'t1':'t2']={flag:'',name:'?'};bracket.fin.winner=null;}
  else{const qi=Math.floor(idx/2);const sl=idx%2===0?'t1':'t2';const nm=rounds[nr];if(nm&&nm[qi]){nm[qi][sl]={flag:'',name:'?'};nm[qi].winner=null;cascadeClear(nr,qi);}}
}

function goStep(step){
  if(step<0)return;
  if(step>=18){savePrediction();return;}
  showStep(step);
}

function savePrediction(){
  const thirds=getThirds();
  const statuses=getThirdsStatus(thirds);
  const champ=bracket.fin.winner?(bracket.fin.winner===1?bracket.fin.t1:bracket.fin.t2):null;
  const data={name:playerName,results:JSON.parse(JSON.stringify(results)),thirdsStatus:JSON.parse(JSON.stringify(statuses)),bracket:JSON.parse(JSON.stringify(bracket)),champ:champ||{flag:'',name:'Belirsiz'}};
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url=window.location.href.split('?')[0]+'?t='+encoded;
  document.getElementById('share-url-box').textContent=url;
  showScreen('result');
}

function copyURL(){
  const url=document.getElementById('share-url-box').textContent;
  navigator.clipboard.writeText(url).then(()=>{const b=event.target;b.textContent='✅ Kopyalandı!';setTimeout(()=>b.textContent='🔗 Linki Kopyala',2000);}).catch(()=>{const b=document.getElementById('share-url-box');const r=document.createRange();r.selectNode(b);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');const btn=event.target;btn.textContent='✅ Kopyalandı!';setTimeout(()=>btn.textContent='🔗 Linki Kopyala',2000);});
}

function viewFull(){const url=document.getElementById('share-url-box').textContent;const t=new URLSearchParams('?'+(url.split('?')[1]||'')).get('t');if(t)displayPrediction(t);}

function viewTab(name,el){
  document.querySelectorAll('#screen-view .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['groups','thirds','bracket'].forEach(n=>document.getElementById('view-'+n+'-tab').classList.toggle('active',n===name));
}

function displayPrediction(token){
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(token))));
    document.getElementById('view-name').textContent=data.name+"'in Tahmini";
    document.getElementById('view-champ-line').textContent='Şampiyon: '+(data.champ.flag+' '+data.champ.name);

    // Gruplar
    const vgt=document.getElementById('view-groups-tab');
    vgt.innerHTML='';
    // Rebuild results into standings view
    const tmpResults=data.results;
    const tmpGk=Object.keys(tmpResults);
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px';
    tmpGk.forEach(g=>{
      const teams=GD[g];
      // calc standings manually
      const ts=GD[g].map((t,i)=>({idx:i,flag:t[0],name:t[1],pts:0,w:0,d:0,l:0}));
      MATCH_PAIRS.forEach(([a,b])=>{
        const res=tmpResults[g][a+'_'+b];
        if(!res)return;
        if(res==='W'){ts[a].pts+=3;ts[a].w++;ts[b].l++;}
        else if(res==='D'){ts[a].pts+=1;ts[b].pts+=1;ts[a].d++;ts[b].d++;}
        else if(res==='L'){ts[b].pts+=3;ts[b].w++;ts[a].l++;}
      });
      ts.sort((a,b)=>b.pts-a.pts);
      const card=document.createElement('div');
      card.className='group-section';
      card.innerHTML=`<div class="group-section-header">Grup ${g}</div>
        <table class="standings-table"><thead><tr><th>#</th><th>Takım</th><th>P</th></tr></thead>
        <tbody>${ts.map((t,i)=>`<tr class="${i<2?'q'+(i+1):i===2?'q3':'out'}"><td>${i+1}</td><td>${t.flag} ${t.name}</td><td><strong>${t.pts}</strong></td></tr>`).join('')}</tbody></table>`;
      grid.appendChild(card);
    });
    vgt.appendChild(grid);

    // 3. sıra
    const tbl=document.getElementById('view-thirds-tbl');
    if(data.thirdsStatus&&tbl){
      const sorted=[...data.thirdsStatus].sort((a,b)=>b.pts-a.pts);
      tbl.innerHTML=`<thead><tr><th>#</th><th>Grup</th><th>Takım</th><th>P</th><th>Durum</th></tr></thead>`;
      const tbody=document.createElement('tbody');
      sorted.forEach((t,i)=>{
        const tr=document.createElement('tr');
        tr.className=t.status==='pass'?'pass-row':'out-row';
        const badge=t.status==='pass'?'<span class="badge badge-pass">✓</span>':t.status==='tie'?'<span class="badge badge-tie">~</span>':'<span class="badge badge-out">✗</span>';
        tr.innerHTML=`<td>${i+1}</td><td><strong>${t.group}</strong></td><td>${t.flag} ${t.name}</td><td><strong>${t.pts}</strong></td><td>${badge}</td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
    }

    // Bracket
    const vbi=document.getElementById('view-bracket-inner');vbi.innerHTML='';
    const br=data.bracket;
    [{l:'Son 32',d:br.r32,k:'r32'},{l:'Son 16',d:br.r16,k:'r16'},{l:'Çeyrek',d:br.qf,k:'qf'},{l:'Yarı',d:br.sf,k:'sf'}].forEach(({l,d,k})=>{
      const col=document.createElement('div');col.className='round-col';
      const lbl=document.createElement('div');lbl.className='round-lbl';lbl.textContent=l;col.appendChild(lbl);
      const mc=document.createElement('div');mc.className='matches-col';
      d.forEach((m,i)=>{
        const box=document.createElement('div');box.className='match-box';
        [[m.t1,1],[m.t2,2]].forEach(([t,tn])=>{
          const row=document.createElement('div');
          row.className='mt'+(m.winner===tn?' win':m.winner&&m.winner!==tn?' lose':'');
          row.innerHTML=`<span class="mf">${t.flag||''}</span><span class="mn">${t.name||'?'}</span>`;
          box.appendChild(row);
        });
        mc.appendChild(box);
      });
      col.appendChild(mc);vbi.appendChild(col);
    });
    const cc=document.createElement('div');cc.className='champ-col';
    const fl=document.createElement('div');fl.className='round-lbl';fl.textContent='Final';cc.appendChild(fl);
    const fb=document.createElement('div');fb.className='match-box';fb.style.marginBottom='5px';
    [[br.fin.t1,1],[br.fin.t2,2]].forEach(([t,tn])=>{const r=document.createElement('div');r.className='mt'+(br.fin.winner===tn?' win':br.fin.winner&&br.fin.winner!==tn?' lose':'');r.innerHTML=`<span class="mf">${t.flag||''}</span><span class="mn">${t.name||'?'}</span>`;fb.appendChild(r);});
    cc.appendChild(fb);
    const ti=document.createElement('div');ti.className='champ-t';ti.textContent='🏆';
    const cl=document.createElement('div');cl.className='champ-l';cl.textContent='Şampiyon';
    const cn=document.createElement('div');cn.className='champ-n';cn.textContent=data.champ.flag+' '+data.champ.name;
    cc.appendChild(ti);cc.appendChild(cl);cc.appendChild(cn);vbi.appendChild(cc);
    showScreen('view');
  }catch(e){alert('Tahmin yüklenemedi.');}
}

function loadFromURL(){const t=new URLSearchParams(window.location.search).get('t');if(t)displayPrediction(t);else alert("URL'de tahmin bulunamadı.");}
window.addEventListener('load',()=>{const t=new URLSearchParams(window.location.search).get('t');if(t)displayPrediction(t);});
</script>
